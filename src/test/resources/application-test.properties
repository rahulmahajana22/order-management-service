# ── H2 In-Memory Database (Tests use isolated, fast in-memory DB) ───────────
spring.datasource.url=jdbc:h2:mem:orderdb_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
# Suppress data.sql in tests — each test manages its own data
spring.sql.init.mode=never

# ── JWT — hardcoded test secret (not used in production) ─────────────────────
app.jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RzLW9ubHktbm90LWZvci1wcm9kdWN0aW9u
app.jwt.expiration-ms=3600000

# ── Seed credentials — hardcoded for tests ───────────────────────────────────
app.seed.admin.username=admin
app.seed.admin.password=admin123
app.seed.user.username=user
app.seed.user.password=user123

# ── Resilience4j — high limits so tests are never throttled ──────────────────
resilience4j.ratelimiter.instances.orders.limit-for-period=10000
resilience4j.ratelimiter.instances.orders.limit-refresh-period=1s
resilience4j.ratelimiter.instances.orders.timeout-duration=0s
resilience4j.ratelimiter.instances.auth.limit-for-period=10000
resilience4j.ratelimiter.instances.auth.limit-refresh-period=1s
resilience4j.ratelimiter.instances.auth.timeout-duration=0s
