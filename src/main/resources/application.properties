spring.application.name=order-management

# H2 File-Based Database (Persistent)
spring.datasource.url=jdbc:h2:./data/orderdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${H2_DB_USERNAME}
spring.datasource.password=${H2_DB_PASSWORD}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# HikariCP — default isolation: READ_COMMITTED (prevents dirty reads, best perf balance)
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

# Scheduler
app.scheduler.order-processing-rate=300000

# SQL Init — embedded runs data.sql for H2 on each startup (INSERTs are idempotent)
spring.sql.init.mode=embedded
spring.jpa.defer-datasource-initialization=true

# JWT — require environment variable (no embedded default)
# Set `JWT_SECRET` in the environment for signing / verification
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# Seed users — values must come from environment variables (no defaults)
app.seed.admin.username=${SEED_ADMIN_USERNAME}
app.seed.admin.password=${SEED_ADMIN_PASSWORD}
app.seed.user.username=${SEED_USER_USERNAME}
app.seed.user.password=${SEED_USER_PASSWORD}

# Rate limiting (Resilience4j) — low limits for manual testing
# Orders API: 3 req / 30s
resilience4j.ratelimiter.instances.orders.limit-for-period=3
resilience4j.ratelimiter.instances.orders.limit-refresh-period=30s
resilience4j.ratelimiter.instances.orders.timeout-duration=0
# Auth API: 2 req / 30s
resilience4j.ratelimiter.instances.auth.limit-for-period=2
resilience4j.ratelimiter.instances.auth.limit-refresh-period=30s
resilience4j.ratelimiter.instances.auth.timeout-duration=0
