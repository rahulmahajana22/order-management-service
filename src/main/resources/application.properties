spring.application.name=order-management

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${H2_DB_USERNAME}
spring.datasource.password=${H2_DB_PASSWORD}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# HikariCP — default isolation: READ_COMMITTED (prevents dirty reads, best perf balance)
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

# Scheduler
app.scheduler.order-processing-rate=300000

# SQL Init — defer ensures data.sql runs AFTER Hibernate creates tables
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT — override JWT_SECRET env var in production with a strong Base64-encoded 256-bit key
app.jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIEpXVCB0b2tlbiBzaWduaW5nIHB1cnBvc2VzIQ==}
app.jwt.expiration-ms=86400000

# Seed users — values come from .env; fallback defaults are for local dev only
app.seed.admin.username=${SEED_ADMIN_USERNAME:admin}
app.seed.admin.password=${SEED_ADMIN_PASSWORD:admin123}
app.seed.user.username=${SEED_USER_USERNAME:user}
app.seed.user.password=${SEED_USER_PASSWORD:user123}

# Rate limiting (Resilience4j) — low limits for manual testing
# Orders API: 3 req / 30s
resilience4j.ratelimiter.instances.orders.limit-for-period=3
resilience4j.ratelimiter.instances.orders.limit-refresh-period=30s
resilience4j.ratelimiter.instances.orders.timeout-duration=0
# Auth API: 2 req / 30s
resilience4j.ratelimiter.instances.auth.limit-for-period=2
resilience4j.ratelimiter.instances.auth.limit-refresh-period=30s
resilience4j.ratelimiter.instances.auth.timeout-duration=0
